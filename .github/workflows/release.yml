name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Version, tag, and push if changesets are present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          real=()
          for f in .changeset/*.md; do
            [ "$(basename "$f")" != "README.md" ] && real+=("$f")
          done
          if [ ${#real[@]} -eq 0 ]; then
            echo "No changesets present — nothing to release."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm exec changeset version
          git add -A
          git commit -m "chore(release): version packages [skip ci]"
          pnpm exec changeset tag
          git push --atomic --tags origin HEAD:main
